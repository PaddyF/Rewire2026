# Rewire 2026 Lineup — source of truth
# 9–12 April · The Hague · 15th Anniversary
#
# Two top-level collections:
#
#   artists:
#     <slug>:
#       name:       display name
#       genres:     comma-separated string
#       latest:     { title, year, label, artist, note, rating, votes }
#       top_rated:  { title, year, label, artist, note, rating, votes }
#       notes:      free-text paragraph
#
#   slots:
#     - display_name:  how it appears on the poster
#       day:           Thu | Fri | Sat | Sun  (or null if TBA); array for multi-day slots e.g. [Sat, Sun]
#       time:          "HH:MM" 24h format (or null if TBA)
#       stage:         venue/stage name (or null if TBA)
#       wave:          W1 | W2 | W3
#       type:          Live | DJ Set | Installation | World Premiere | etc.
#       is_collab:     true if this slot features a collaboration between artists
#       artist_ids:    list of artist slugs (references artists.<slug>)
#       project:       subtitle / project name (optional)
#       collab_notes:  notes specific to the collaboration (optional)
#       collab_latest: release by the collab itself, not by individuals (optional)
#       collab_top_rated: top-rated collab release (optional)




