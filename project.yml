name: Rewire2026
options:
  bundleIdPrefix: com.paddyf
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"

targets:
  Rewire2026:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    preBuildScripts:
      - name: Build Lineup JSON
        script: |
          set -e
          cd "$SRCROOT/Data"
          /Users/paddyf/.pyenv/versions/3.12.7/bin/python3 build.py
          cp lineup.json "$SRCROOT/Rewire2026/Resources/lineup.json"
        inputFiles:
          - $(SRCROOT)/Data/lineup.yaml
        outputFiles:
          - $(SRCROOT)/Rewire2026/Resources/lineup.json
    sources:
      - path: Rewire2026
    info:
      path: Rewire2026/Info.plist
      properties:
        CFBundleDisplayName: Rewire 2026
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.paddyf.Rewire2026
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""

  Rewire2026Tests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Rewire2026Tests
    dependencies:
      - target: Rewire2026
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Rewire2026.app/Rewire2026"
        SWIFT_VERSION: "5.9"
